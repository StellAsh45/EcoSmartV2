<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Catálogo</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
                            500: '#10f981', 600: '#059669', 700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeInSlow {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleDownSlow {
            from {
                transform: scale(1.1);
            }

            to {
                transform: scale(1);
            }
        }

        .animate-fade-in-slow {
            animation: fadeInSlow 1.5s ease-in-out forwards;
        }

        .animate-scale-down-slow {
            animation: scaleDownSlow 10s linear forwards;
        }

        .backdrop-fix {
            transform: translateZ(0);
            backface-visibility: hidden;
            perspective: 1000px;
            will-change: transform, opacity, backdrop-filter;
        }

        .particles-container {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(190, 242, 100, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 150px 150px;
            opacity: 0.6;
            animation: floatParticles 30s linear infinite;
        }

        @keyframes floatParticles {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(16, 249, 129, 0.2);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 249, 129, 0.4);
            border-radius: 10px;
        }

        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scaleIn { animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col relative custom-scrollbar">
    <!-- Fondo Visual -->
    <div class="fixed inset-0 z-[-1] bg-slate-950 overflow-hidden">
        <div class="absolute inset-0 animate-fade-in-slow">
            <div class="absolute inset-0 animate-scale-down-slow">
                <img src="https://images.unsplash.com/photo-1473448912268-2022ce9509d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                    class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]" />
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/80 via-slate-950/40 to-slate-950/80"></div>
            </div>
            <div class="absolute inset-0 opacity-40 mix-blend-overlay pointer-events-none">
                <div
                    class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-[150px] animate-pulse bg-emerald-900/40">
                </div>
                <div
                    class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] rounded-full blur-[150px] animate-pulse bg-primary-900/40 delay-1000">
                </div>
            </div>
        </div>
        <div class="particles-container pointer-events-none"></div>
    </div>

    <!-- Header -->
    <header
        class="fixed top-0 w-full z-50 bg-white/5 backdrop-blur-2xl backdrop-fix border-b border-primary-800/90 px-6 sm:px-10 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="dashboard-estudiante.html"
                class="p-2 text-slate-400 hover:text-white transition-colors bg-white/5 rounded-xl border-none cursor-pointer">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <a class="flex items-center gap-3 group no-underline text-white cursor-default">
                <div class="relative">
                    <div
                        class="absolute inset-0 bg-primary-400 blur-xl opacity-20 group-hover:opacity-50 transition-opacity">
                    </div>
                    <img src="assets/logo.png"
                        class="w-12 h-12 relative group-hover:scale-110 transition-transform duration-500 object-contain brightness-110 contrast-125">
                </div>
                <span class="text-xl font-black tracking-tight text-white font-heading hidden sm:block">Catálogo</span>
            </a>
        </div>

        <div class="flex items-center gap-6">
            <div class="w-px h-6 bg-white/10 hidden sm:block"></div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right min-w-[100px] flex justify-end">
                    <p id="nav-username"
                        class="text-xs sm:text-sm font-black text-primary-400 uppercase animate-[fadeIn_0.3s_ease-out] truncate max-w-[150px] sm:max-w-none">
                        ESTUDIANTE</p>
                </div>
                <a href="perfil.html"
                    class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-white/20 hover:scale-105 transition-all border border-transparent">
                    <i data-lucide="user" class="text-primary-400 w-6 h-6"></i>
                </a>
                <button onclick="cerrarSesion()"
                    class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-white/20 hover:scale-105 transition-all border border-transparent">
                    <i data-lucide="log-out" class="text-red-500 w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 pt-36 md:pt-40 pb-20 px-6 max-w-7xl mx-auto w-full space-y-12 relative z-10">
        <section class="text-center">
            <div class="absolute top-0 right-0 w-96 h-96 bg-primary-500/10 blur-[100px] -mr-48 -mt-48 rounded-full">
            </div>
            <h2 class="text-4xl md:text-6xl font-black text-white mb-5 tracking-tight font-heading">
                Catálogo de <span
                    class="text-primary-400 underline decoration-primary-500/30 underline-offset-8">cursos</span>
            </h2>
            <p class="text-lg md:text-xl text-primary-50 font-medium max-w-2xl mx-auto">
                Explora y domina nuevas habilidades que te permitirán impulsar tu educación ambiental.
            </p>
        </section>

        <section id="contenedor-catalogo">
            <div id="spinner" class="flex justify-center py-24">
                <div class="w-12 h-12 border-4 border-primary-500/20 border-t-primary-500 rounded-full animate-spin">
                </div>
            </div>

            <div id="grid-cursos" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 xl:gap-12 items-start">
                <!-- Se renderiza vía JS -->
            </div>

            <div id="mensaje-vacio" class="hidden text-center text-primary-50 font-bold italic py-16">
                No hay cursos disponibles todavía. ¡Vuelve pronto!
            </div>
        </section>
    </main>

    <!-- Overlay de Confirmación de Inscripción -->
    <div id="overlayInscripcion" class="fixed inset-0 z-[9999] hidden items-center justify-center p-6 animate-fadeIn bg-slate-950 backdrop-blur-2xl" style="backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
        <div class="relative flex flex-col items-center text-center space-y-8 max-w-md w-full">
            <!-- Icono -->
            <div id="overlayIconoContenedor"
                class="w-28 h-28 rounded-full flex items-center justify-center animate-scaleIn bg-primary-500 shadow-[0_0_60px_rgba(16,249,129,0.4)] transition-all">
                <i id="overlayIcono" data-lucide="graduation-cap" class="w-16 h-16 text-slate-950"></i>
            </div>
            <!-- Textos -->
            <div class="space-y-3 animate-fadeIn">
                <h2 id="overlayTitulo" class="text-3xl font-black text-white tracking-tight font-heading uppercase leading-none">
                    ¿Inscribirse al curso?
                </h2>
                <p id="overlayMensaje"
                    class="text-primary-50 font-bold uppercase tracking-[0.25em] text-[10px] max-w-xs mx-auto leading-relaxed">
                    Una vez inscrito, podrás acceder a todo el contenido del curso desde tu dashboard.
                </p>
            </div>
            <!-- Botones -->
            <div class="flex flex-col gap-4 w-full px-6 animate-fadeIn">
                <button id="overlayBtnConfirmar"
                    class="w-full bg-primary-500 text-slate-950 font-black py-4 px-8 rounded-2xl transition-all active:scale-95 text-lg border-none cursor-pointer shadow-2xl">
                    Sí, inscribirme
                </button>
                <button onclick="cerrarOverlayInscripcion()"
                    class="w-full bg-white/5 text-white font-bold py-4 px-8 rounded-2xl transition-all hover:bg-white/10 active:scale-95 text-[10px] border border-white/10 border-solid cursor-pointer uppercase tracking-[0.2em]">
                    Volver atrás
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        let cursosCache = [];
        let cursosInscritos = new Set();

        function obtenerID(id) {
            if (!id) return null;
            if (typeof id === 'object' && id.$oid) return id.$oid;
            return id;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const u = JSON.parse(localStorage.getItem('usuario') || '{}');
            if (u.nombre) document.getElementById('nav-username').textContent = u.nombre;
            lucide.createIcons();
            cargarCursos();
            // Conectar botón del overlay
            document.getElementById('overlayBtnConfirmar').addEventListener('click', ejecutarInscripcion);
        });

        async function cargarCursos() {
            try {
                // Obtener cursos
                const res = await fetch(`${API_BASE}/cursos`);
                const data = await res.json();
                cursosCache = data.filter(c => c.estado === 'publicado');

                // Obtener inscripciones si hay usuario logueado
                const user = JSON.parse(localStorage.getItem('usuario') || '{}');
                const userID = user.sub || user._id || user.id;
                
                if (userID) {
                    const resInsc = await fetch(`${API_BASE}/inscripciones?usuario_id=${userID}`);
                    if (resInsc.ok) {
                        const inscripciones = await resInsc.json();
                        inscripciones.forEach(insc => cursosInscritos.add(obtenerID(insc.curso_id)));
                    }
                }

                renderizarCursos();
            } catch (err) {
                document.getElementById('contenedor-catalogo').innerHTML = `<p class="text-center text-red-400 font-bold py-10">Error al cargar cursos.</p>`;
            } finally {
                document.getElementById('spinner').classList.add('hidden');
            }
        }

        function renderizarCursos() {
            const grid = document.getElementById('grid-cursos');
            const vacio = document.getElementById('mensaje-vacio');

            if (cursosCache.length === 0) {
                vacio.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            grid.innerHTML = cursosCache.map(curso => {
                const cursoID = obtenerID(curso._id);
                let totalLecciones = 0;
                if (curso.modulos) curso.modulos.forEach(m => totalLecciones += (m.lecciones ? m.lecciones.length : 0));

                return `
                <div class="bg-white/5 backdrop-blur-xl rounded-[2.5rem] overflow-hidden border border-white/10 hover:border-white/20 hover:bg-white/10 transition-all group shadow-2xl relative flex flex-col">
                    <div class="relative h-60 overflow-hidden m-3 rounded-[2rem] shrink-0">
                        <img src="${curso.imagen_url || 'https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&q=80&w=1000'}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000 brightness-[0.85] group-hover:brightness-100" />
                        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full border border-white/20 flex items-center gap-2">
                            <i data-lucide="book" class="text-primary-400 w-3 h-3"></i>
                            <span class="text-xs font-bold text-white">${totalLecciones} lecciones</span>
                        </div>
                    </div>

                    <div class="p-8 pt-4 flex-1 flex flex-col">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest border 
                                ${curso.nivel === 'Principiante' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' :
                        curso.nivel === 'Intermedio' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' :
                            'bg-purple-500/10 text-purple-400 border-purple-500/20'}">
                                ${curso.nivel || 'Sin Nivel'}
                            </span>
                        </div>

                        <h3 class="text-2xl font-black text-primary-400 mb-3 leading-tight group-hover:text-primary-300 transition-colors font-heading">
                            ${curso.titulo}
                        </h3>

                        <p id="desc-${cursoID}" class="text-primary-50 text-sm font-medium mb-4 leading-relaxed flex-1 transition-all duration-300 line-clamp-2">
                            ${curso.descripcion}
                        </p>

                        <button onclick="toggleDesc('${cursoID}')" class="text-primary-400 hover:text-primary-300 text-[10px] font-black uppercase tracking-widest mb-6 transition-colors flex items-center gap-1">
                            <span id="btnText-${cursoID}">Ver más...</span>
                        </button>

                        <div class="flex flex-col sm:flex-row gap-4 mt-auto">
                            ${cursosInscritos.has(cursoID)
                                ? `<button onclick="window.location.href='dashboard-estudiante.html'" class="flex-1 bg-emerald-500/10 text-emerald-400 font-bold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2 text-sm uppercase tracking-wider border border-emerald-500/20 cursor-pointer shadow-[0_0_20px_rgba(16,249,129,0.1)]">
                                    <i data-lucide="check-circle" class="w-4 h-4"></i> Inscrito
                                   </button>`
                                : `<button onclick="inscribirse('${cursoID}')" class="flex-1 bg-primary-500 hover:bg-primary-400 text-slate-900 font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-primary-500/20 hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 text-sm uppercase tracking-wider cursor-pointer">
                                    Inscribirse <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                   </button>`
                            }
                            <button onclick="toggleDetalles('${cursoID}')" class="flex-none bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl transition-all border border-white/10 text-sm uppercase tracking-wider flex items-center justify-center gap-2 cursor-pointer">
                                Detalles <i data-lucide="chevron-down" id="icon-${cursoID}" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div id="detalles-${cursoID}" class="hidden px-8 pb-8 pt-0 animate-[fadeIn_0.3s_ease-out]">
                        <div class="border-t border-white/10 pt-6">
                            <h4 class="text-lg font-black text-primary-500 mb-4 flex items-center gap-2">
                                <i data-lucide="list" class="w-5 h-5"></i> Contenido del Curso
                            </h4>
                            <div class="space-y-3">
                                ${curso.modulos ? curso.modulos.map((mod, i) => `
                                    <div class="border border-white/5 rounded-xl bg-white/5 overflow-hidden">
                                        <button onclick="toggleModulo('${cursoID}', ${i})" class="w-full flex items-center justify-between p-4 hover:bg-white/5 transition-colors">
                                            <div class="flex items-center gap-3">
                                                <div class="w-7 h-7 rounded-full bg-primary-500/20 text-primary-400 flex items-center justify-center font-bold text-xs">${i + 1}</div>
                                                <span class="text-white font-bold text-sm">${mod.titulo}</span>
                                            </div>
                                            <i data-lucide="chevron-down" class="w-4 h-4 text-primary-400"></i>
                                        </button>
                                        <div id="mod-${cursoID}-${i}" class="hidden px-4 pb-4 pt-2 bg-black/20">
                                            <ul class="space-y-2 mt-2">
                                                ${mod.lecciones ? mod.lecciones.map(lec => `
                                                    <li class="flex items-center gap-3 text-sm text-primary-50">
                                                        <i data-lucide="book-open" class="w-3.5 h-3.5 text-primary-500"></i>
                                                        <span>${lec.titulo}</span>
                                                    </li>
                                                `).join('') : '<li class="text-xs text-slate-500 italic">Sin lecciones</li>'}
                                            </ul>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-slate-500 italic text-sm">Sin módulos</p>'}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        function toggleDesc(id) {
            const p = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btnText-${id}`);
            if (p.classList.contains('line-clamp-2')) {
                p.classList.remove('line-clamp-2');
                btn.textContent = 'Ver menos';
            } else {
                p.classList.add('line-clamp-2');
                btn.textContent = 'Ver más...';
            }
        }

        function toggleDetalles(id) {
            const d = document.getElementById(`detalles-${id}`);
            const i = document.getElementById(`icon-${id}`);
            d.classList.toggle('hidden');
            if (i) i.style.transform = d.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function toggleModulo(cursoId, index) {
            const m = document.getElementById(`mod-${cursoId}-${index}`);
            m.classList.toggle('hidden');
        }

        let cursoIdPendiente = null;

        function inscribirse(cursoId) {
            const user = JSON.parse(localStorage.getItem('usuario') || '{}');
            const userID = user.sub || user._id || user.id;

            if (!userID) {
                window.location.href = 'ingreso.html';
                return;
            }
            // Guardar el curso y mostrar overlay de confirmación
            cursoIdPendiente = cursoId;
            mostrarOverlayInscripcion();
        }

        function mostrarOverlayInscripcion() {
            const overlay = document.getElementById('overlayInscripcion');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            lucide.createIcons();
        }

        function cerrarOverlayInscripcion() {
            const overlay = document.getElementById('overlayInscripcion');
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            cursoIdPendiente = null;
        }

        async function ejecutarInscripcion() {
            const user = JSON.parse(localStorage.getItem('usuario') || '{}');
            const userID = user.sub || user._id || user.id;
            const cursoId = cursoIdPendiente;

            // Cambiar overlay a estado de carga
            document.getElementById('overlayBtnConfirmar').textContent = 'Inscribiendo...';
            document.getElementById('overlayBtnConfirmar').disabled = true;

            try {
                // Verificar si ya está inscrito
                const resCheck = await fetch(`${API_BASE}/inscripciones?usuario_id=${userID}&curso_id=${cursoId}`);
                const inscripciones = await resCheck.json();

                if (inscripciones.length > 0) {
                    // Ya inscrito: cambiar overlay a informativo
                    document.getElementById('overlayIconoContenedor').className = 'w-28 h-28 rounded-full flex items-center justify-center animate-scaleIn bg-blue-500 shadow-[0_0_60px_rgba(59,130,246,0.4)] transition-all';
                    document.getElementById('overlayIcono').setAttribute('data-lucide', 'info');
                    document.getElementById('overlayTitulo').textContent = 'Ya estás inscrito';
                    document.getElementById('overlayMensaje').textContent = 'Ya participas en este curso. Accédelo desde tu dashboard.';
                    document.getElementById('overlayBtnConfirmar').textContent = 'Ir al Dashboard';
                    document.getElementById('overlayBtnConfirmar').disabled = false;
                    document.getElementById('overlayBtnConfirmar').onclick = () => window.location.href = 'dashboard-estudiante.html';
                    lucide.createIcons();
                    return;
                }

                // Inscribir
                const res = await fetch(`${API_BASE}/inscripciones`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario_id: userID,
                        curso_id: cursoId,
                        progreso_porcentaje: 0,
                        estado_curso: 'en progreso'
                    })
                });

                if (res.ok) {
                    // Éxito: cambiar overlay a verde de éxito
                    document.getElementById('overlayIconoContenedor').className = 'w-28 h-28 rounded-full flex items-center justify-center animate-scaleIn bg-primary-500 shadow-[0_0_60px_rgba(16,249,129,0.4)] transition-all';
                    document.getElementById('overlayIcono').setAttribute('data-lucide', 'check-circle');
                    document.getElementById('overlayTitulo').textContent = '¡Inscripción exitosa!';
                    document.getElementById('overlayMensaje').textContent = 'Ya puedes acceder al curso completo desde tu dashboard de estudiante.';
                    document.getElementById('overlayBtnConfirmar').textContent = 'Ir al Dashboard';
                    document.getElementById('overlayBtnConfirmar').disabled = false;
                    document.getElementById('overlayBtnConfirmar').onclick = () => window.location.href = 'dashboard-estudiante.html';
                    lucide.createIcons();
                } else {
                    // Error del servidor
                    document.getElementById('overlayIconoContenedor').className = 'w-28 h-28 rounded-full flex items-center justify-center animate-scaleIn bg-red-500 shadow-[0_0_60px_rgba(239,68,68,0.4)] transition-all';
                    document.getElementById('overlayIcono').setAttribute('data-lucide', 'x-circle');
                    document.getElementById('overlayTitulo').textContent = 'Error al inscribirse';
                    document.getElementById('overlayMensaje').textContent = 'No se pudo completar la inscripción. Inténtalo de nuevo.';
                    document.getElementById('overlayBtnConfirmar').textContent = 'Cerrar';
                    document.getElementById('overlayBtnConfirmar').disabled = false;
                    document.getElementById('overlayBtnConfirmar').onclick = cerrarOverlayInscripcion;
                    lucide.createIcons();
                }
            } catch (err) {
                console.error(err);
                cerrarOverlayInscripcion();
                alert('Error de conexión con el servidor.');
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'ingreso.html';
        }
    </script>
</body>

</html>
