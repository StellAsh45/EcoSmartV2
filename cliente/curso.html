<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Vista del Curso</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac',
                            400: '#4ade80', 500: '#10f981', 600: '#059669',
                            700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'Inter', 'sans-serif'],
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --course-bg-image: url('https://images.unsplash.com/photo-1473448912268-2022ce9509d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
        }

        body {
            background-color: #020617;
            color: white;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .visual-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #020617;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-image-original {
            position: absolute;
            inset: 0;
            background-image: var(--course-bg-image);
            background-size: cover;
            background-position: center;
            filter: grayscale(0.2) contrast(1.1);
        }

        .bg-image-original::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.8));
        }

        .mesh-gradient-estudiante {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        .m-1 {
            position: absolute;
            top: -10%;
            left: -20%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: #10b981;
            filter: blur(150px);
            opacity: 0.4;
        }

        .m-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: #0ea5e9;
            filter: blur(150px);
            opacity: 0.3;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-scaleIn {
            animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        .quiz-question-card {
            position: relative;
            overflow: hidden;
            background: rgba(2, 6, 23, 0.22);
            -webkit-backdrop-filter: blur(64px);
            backdrop-filter: blur(64px);
            transition: all 150ms ease;
        }

        .quiz-question-card::before {
            content: "";
            position: absolute;
            inset: -64px;
            z-index: 0;
            background-image: var(--course-bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(36px) saturate(130%);
            opacity: 0.42;
            transform: scale(1.04);
            pointer-events: none;
        }

        .quiz-question-card::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(15, 23, 42, 0.22));
            pointer-events: none;
        }

        .quiz-question-card>* {
            position: relative;
            z-index: 2;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(16, 249, 129, 0.2);
            border-radius: 10px;
        }

        [hidden] {
            display: none !important;
        }
    </style>
</head>

<body class="font-sans antialiased overflow-hidden">

    <div class="visual-background">
        <div class="bg-image-original"></div>
        <div class="mesh-gradient-estudiante">
            <div class="m-1"></div>
            <div class="m-2"></div>
        </div>
    </div>

    <!-- Cabecera -->
    <header
        class="fixed top-0 w-full z-[100] bg-white/5 backdrop-blur-2xl border-b border-primary-800/90 px-6 sm:px-10 py-4 flex justify-between items-center h-20 transition-all">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()"
                class="p-3 bg-white/10 hover:bg-white/20 rounded-2xl border-none text-white cursor-pointer transition-all">
                <i id="sidebarIcon" data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-3 group no-underline text-white">
                    <img src="assets/logo.png" alt="EcoSmart Logo" class="w-10 h-10 object-contain">
                </div>
                <div class="w-px h-6 bg-white/10 mx-2 hidden sm:block"></div>
                <a href="dashboard-estudiante.html"
                    class="p-2 text-slate-400 hover:text-white transition-colors bg-white/5 rounded-xl border-none cursor-pointer flex items-center justify-center">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <!-- Progreso-->
            <div
                class="flex items-center gap-2 md:gap-4 bg-white/5 px-3 py-1.5 md:px-4 md:py-2 rounded-2xl border border-white/10">
                <div class="text-right">
                    <p
                        class="text-[8px] md:text-[9px] font-black text-primary-50 uppercase tracking-tighter md:tracking-widest leading-none">
                        Progreso</p>
                    <p id="progresoTexto" class="text-xs md:text-sm font-black text-primary-400 leading-none mt-0.5">0%
                    </p>
                </div>
                <div class="w-10 md:w-14 h-1 md:h-2 bg-white/10 rounded-full overflow-hidden shrink-0">
                    <div id="progresoBarra" class="h-full bg-primary-500 transition-all duration-1000"
                        style="width: 0%;"></div>
                </div>
            </div>

            <div class="w-px h-6 bg-white/10 hidden md:block"></div>
            <button onclick="cerrarSesion()"
                class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-white/20 hover:scale-105 border border-white/10 transition-all">
                <i data-lucide="log-out" class="text-red-500 w-6 h-6"></i>
            </button>
        </div>
    </header>

    <div class="flex-1 flex pt-20 h-screen relative overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="fixed top-20 bottom-0 left-0 z-[90] w-80 bg-slate-950/95 border-r border-white/10 flex flex-col transition-transform duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] -translate-x-full">
            <div class="p-8 border-b border-white/5 flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-primary-500/10 rounded-xl flex items-center justify-center text-primary-400 border border-primary-500/20">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                </div>
                <div class="overflow-hidden">
                    <h3 id="cursoTituloSidebar"
                        class="text-sm font-black text-white uppercase tracking-widest truncate">Cargando...</h3>
                    <p id="cursoModulosSidebar" class="text-[10px] text-primary-50/80 font-bold uppercase">0 Módulos</p>
                </div>
            </div>

            <div id="sidebarContent" class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-4">
                <!-- Módulos cargados aquí -->
            </div>
        </aside>

        <div id="sidebarOverlay" onclick="toggleSidebar()"
            class="fixed inset-0 bg-black/60 z-[85] lg:hidden transition-all duration-300 opacity-0 pointer-events-none">
        </div>

        <!-- Contenido Principal -->
        <main id="mainScroll"
            class="flex-1 flex flex-col relative z-10 overflow-y-auto custom-scrollbar p-6 lg:p-12 space-y-10 scroll-smooth w-full lg:ml-0 transition-all duration-500">

            <div id="loading" class="flex flex-col items-center justify-center h-full">
                <div class="w-12 h-12 border-4 border-primary-500/20 border-t-primary-500 rounded-full animate-spin">
                </div>
                <p class="mt-4 font-bold text-primary-400 animate-pulse">Cargando contenido...</p>
            </div>

            <div id="contentArea" class="max-w-4xl mx-auto w-full space-y-8 hidden animate-fadeIn pb-32">
                <!-- Se inyecta la lección o el quiz -->
            </div>

        </main>
    </div>

    <!-- Resultados Examen Modal/Sección -->
    <div id="resultadosSection" class="hidden"></div>

    <!-- Modal confirmación (igual al del dashboard-administrador) -->
    <div id="confirm-modal" class="fixed inset-0 z-[9999] hidden flex items-center justify-center p-6 animate-fadeIn">
        <div class="absolute inset-0 bg-slate-950"
            style="backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); opacity: 1;"
            onclick="cerrarModal()"></div>
        <div class="relative flex flex-col items-center text-center space-y-10 max-w-md w-full">
            <div id="modal-icon-container"
                class="w-32 h-32 rounded-full flex items-center justify-center animate-scaleIn shadow-2xl bg-amber-500">
                <i id="modal-icon" data-lucide="alert-triangle" class="text-slate-950 w-16 h-16"></i>
            </div>
            <div class="space-y-4">
                <h2 id="modal-title"
                    class="text-4xl font-black text-white font-heading uppercase leading-none tracking-tight">¡Un
                    momento!</h2>
                <p id="modal-message"
                    class="text-primary-50 font-bold uppercase tracking-[0.25em] text-[10px] max-w-xs mx-auto leading-relaxed">
                    Mensaje aquí</p>
            </div>
            <div class="flex flex-col gap-4 w-full px-6">
                <button id="modal-confirm-btn"
                    class="w-full bg-amber-500 text-slate-950 font-black py-5 rounded-3xl transition-all active:scale-95 text-xl border-none cursor-pointer shadow-2xl">Entendido</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const API_C = 'http://localhost:3000/cursos';
        const API_R = 'http://localhost:3000/resultados-examen';
        let cursoData = null;
        let leccionesCompletadas = new Set();
        let examenesAprobados = new Set();
        let cursoId = new URLSearchParams(window.location.search).get('id');
        let usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

        let sidebarAbierto = false;
        let actividadActiva = null;

        let respuestasExamen = [];
        let inscripcionActiva = null;
        let resultadosExamenesGuardados = {};

        document.addEventListener('DOMContentLoaded', async () => {
            // El backend retorna JWT payload con 'sub' como ID, no '_id'
            const uid = obtenerUsuarioId();
            if (!uid) { window.location.href = 'ingreso.html'; return; }
            if (!cursoId) { window.location.href = 'dashboard-estudiante.html'; return; }

            if (window.innerWidth >= 1024) toggleSidebar();

            await cargarDatos(uid);
        });

        function cerrarSesion() { localStorage.clear(); window.location.href = 'ingreso.html'; }

        function obtenerUsuarioId() {
            return usuario.sub || usuario._id || usuario.id;
        }

        function obtenerClaveProgreso(uid = obtenerUsuarioId()) {
            return `progreso_${uid}_${cursoId}`;
        }

        function cargarLeccionesCompletadasGuardadas(uid) {
            const claves = new Set([obtenerClaveProgreso(uid)]);
            [usuario._id, usuario.sub, usuario.id].forEach(id => {
                if (id) claves.add(`progreso_${id}_${cursoId}`);
            });
            claves.add(`progreso_undefined_${cursoId}`);

            const lecciones = new Set();
            claves.forEach(clave => {
                try {
                    JSON.parse(localStorage.getItem(clave) || '[]').forEach(id => lecciones.add(id));
                } catch (e) {
                    console.warn(`No se pudo leer ${clave}`, e);
                }
            });

            leccionesCompletadas = lecciones;
            guardarLeccionesCompletadas();
        }

        function guardarLeccionesCompletadas() {
            localStorage.setItem(obtenerClaveProgreso(), JSON.stringify(Array.from(leccionesCompletadas)));
        }

        function hidratarLeccionesSiCursoCompletado() {
            const cursoCompletadoDB = inscripcionActiva && (Number(inscripcionActiva.progreso_porcentaje) >= 100 || inscripcionActiva.estado_curso === 'completado');
            if (!cursoCompletadoDB || !cursoData?.modulos) return;

            cursoData.modulos.forEach(mod => {
                mod.lecciones.forEach(lec => leccionesCompletadas.add(lec.id_leccion));
            });
            guardarLeccionesCompletadas();
        }

        let mAction = null;
        function abrirModal(tit, msg, btnT, btnC, ico, acc) {
            document.getElementById('modal-title').textContent = tit; document.getElementById('modal-message').textContent = msg;
            const b = document.getElementById('modal-confirm-btn'); b.textContent = btnT; b.className = `w-full text-slate-950 font-black py-5 rounded-3xl transition-all active:scale-95 text-xl shadow-2xl ${btnC}`;
            const icB = document.getElementById('modal-icon-container'); icB.className = `w-32 h-32 rounded-full flex items-center justify-center animate-scaleIn shadow-2xl ${btnC.split(' ')[0]}`;
            document.getElementById('modal-icon').setAttribute('data-lucide', ico);
            lucide.createIcons(); mAction = acc; document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function cerrarModal() { document.getElementById('confirm-modal').classList.add('hidden'); }
        setTimeout(() => {
            document.getElementById('modal-confirm-btn').onclick = async () => { if (mAction) await mAction(); cerrarModal(); };
        }, 100);

        function toggleSidebar() {
            sidebarAbierto = !sidebarAbierto;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const icon = document.getElementById('sidebarIcon');

            if (sidebarAbierto) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                icon.setAttribute('data-lucide', 'x');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                icon.setAttribute('data-lucide', 'menu');
            }
            lucide.createIcons();
        }

        async function cargarDatos(uid) {
            try {
                const r = await fetch(`${API_C}/${cursoId}`);
                cursoData = await r.json();

                document.getElementById('cursoTituloSidebar').innerText = cursoData.titulo;
                document.getElementById('cursoModulosSidebar').innerText = `${cursoData.modulos?.length || 0} Módulos`;

                const rExamen = await fetch(`${API_R}?usuario_id=${uid}&curso_id=${cursoId}`);
                if (rExamen.ok) {
                    const res = await rExamen.json();
                    res.forEach(re => {
                        resultadosExamenesGuardados[re.examen_id] = re;
                        if (re.porcentaje >= 70) examenesAprobados.add(re.examen_id);
                    });
                }

                // Fetch inscripción para actualizar progreso en DB
                const rInsc = await fetch(`http://localhost:3000/inscripciones?usuario_id=${uid}&curso_id=${cursoId}`);
                if (rInsc.ok) {
                    const inscripciones = await rInsc.json();
                    if (inscripciones.length > 0) inscripcionActiva = inscripciones[0];
                }

                cargarLeccionesCompletadasGuardadas(uid);
                hidratarLeccionesSiCursoCompletado();

                await actualizarProgresoGeneral();

                if (cursoData.modulos && cursoData.modulos.length > 0) {
                    cursoData.modulos[0].expandido = true;
                    if (cursoData.modulos[0].lecciones.length > 0) {
                        cargarActividad({ tipo: 'leccion', modIdx: 0, lecIdx: 0 });
                    }
                }

                renderSidebar();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('contentArea').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("Error al cargar el curso.");
            }
        }

        function renderSidebar() {
            const sc = document.getElementById('sidebarContent');
            if (!cursoData.modulos) return;

            sc.innerHTML = cursoData.modulos.map((mod, i) => `
                <div class="space-y-2">
                    <button onclick="toggleExpandirModulo(${i})" class="w-full flex items-center justify-between p-4 bg-white/5 hover:bg-white/10 rounded-[1.5rem] border border-white/10 transition-all group text-left cursor-pointer">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-black text-primary-500">${i + 1}.</span>
                            <span class="text-sm font-bold text-primary-50">${mod.titulo}</span>
                        </div>
                        <i data-lucide="${mod.expandido ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4 text-primary-500"></i>
                    </button>

                    ${mod.expandido ? `
                        <div class="space-y-2 pl-4 animate-fadeIn">
                            ${mod.lecciones.map((lec, li) => {
                const isActiva = actividadActiva?.tipo === 'leccion' && actividadActiva?.modIdx === i && actividadActiva?.lecIdx === li;
                const cursoCompletadoDB = inscripcionActiva && (inscripcionActiva.progreso_porcentaje === 100 || inscripcionActiva.estado_curso === 'completado');
                const isCompletada = leccionesCompletadas.has(lec.id_leccion) || cursoCompletadoDB;
                return `
                                <button onclick="cargarActividad({tipo:'leccion', modIdx:${i}, lecIdx:${li}})" class="w-full flex items-center justify-between p-3 rounded-2xl transition-all cursor-pointer text-left ${isActiva ? 'bg-primary-500 text-slate-950 shadow-lg shadow-primary-500/20' : 'bg-transparent text-primary-50/70 hover:bg-white/5'}">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <i data-lucide="${isCompletada ? 'check-circle' : 'book'}" class="w-4 h-4 flex-shrink-0 ${isActiva ? 'text-slate-950' : 'text-primary-400'}"></i>
                                        <span class="text-xs font-bold truncate">${lec.titulo}</span>
                                    </div>
                                </button>
                                `;
            }).join('')}
                            
                            ${mod.examen?.preguntas?.length > 0 ? `
                                <button onclick="cargarActividad({tipo:'quiz', modIdx:${i}})" class="w-full flex items-center justify-between p-3 rounded-2xl transition-all cursor-pointer text-left mt-1 ${actividadActiva?.tipo === 'quiz' && actividadActiva?.modIdx === i ? 'bg-emerald-500 text-slate-950 shadow-lg shadow-emerald-500/20' : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20'}">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <i data-lucide="${examenesAprobados.has(mod.examen.id_examen) ? 'check-circle' : 'help-circle'}" class="w-4 h-4 flex-shrink-0 ${actividadActiva?.tipo === 'quiz' && actividadActiva?.modIdx === i ? 'text-slate-950' : 'text-emerald-400'}"></i>
                                        <span class="text-xs font-black uppercase tracking-widest truncate">${mod.examen.titulo}</span>
                                    </div>
                                </button>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleExpandirModulo(idx) {
            cursoData.modulos[idx].expandido = !cursoData.modulos[idx].expandido;
            renderSidebar();
        }

        function cargarActividad(act) {
            actividadActiva = act;
            if (window.innerWidth < 1024) toggleSidebar();

            const ca = document.getElementById('contentArea');
            ca.innerHTML = '';

            document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'auto' });

            if (act.tipo === 'leccion') {
                const lec = cursoData.modulos[act.modIdx].lecciones[act.lecIdx];
                const cursoCompletadoDB = inscripcionActiva && (inscripcionActiva.progreso_porcentaje === 100 || inscripcionActiva.estado_curso === 'completado');
                const isCompletada = leccionesCompletadas.has(lec.id_leccion) || cursoCompletadoDB;

                let html = `
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pb-6 border-b border-white/10">
                        <div class="space-y-2">
                            ${isCompletada ? `<span class="text-xs font-black text-emerald-400 uppercase tracking-[0.2em] bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20">Lección Terminada</span>` : `<span class="text-xs font-black text-red-400 uppercase tracking-[0.2em] bg-red-500/10 px-4 py-1.5 rounded-full border border-red-500/20">Lección en Progreso</span>`}
                            <h1 class="text-4xl md:text-5xl font-black text-primary-500 tracking-tight leading-tight font-heading">${lec.titulo}</h1>
                        </div>
                        ${!isCompletada ? `
                            <button onclick="marcarLeccionCompletada()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-black py-4 px-8 rounded-[1.5rem] transition-all shadow-xl shadow-emerald-500/20 hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 border-none cursor-pointer">
                                <i data-lucide="check-circle" class="w-6 h-6"></i> Marcar Completada
                            </button>
                        ` : ''}
                    </div>
                    <div class="prose prose-invert max-w-none space-y-8">
                `;

                lec.bloques.forEach(b => {
                    if (b.tipo === 'titulo') html += `<h2 class="text-3xl md:text-4xl font-black text-primary-50 tracking-tight leading-tight mt-12 mb-6">${b.valor}</h2>`;
                    if (b.tipo === 'subtitulo') html += `<h3 class="text-xl md:text-2xl font-bold text-primary-500 mt-8 mb-4">${b.valor}</h3>`;
                    if (b.tipo === 'texto') html += `<div class="text-lg text-slate-50 font-medium whitespace-pre-wrap py-4">${b.valor}</div>`;
                    if (b.tipo === 'imagen') html += `
                        <div class="my-10 rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl group relative bg-slate-900/50 min-h-[100px]">
                            <img src="${b.valor}" class="w-full h-auto block group-hover:scale-[1.02] transition-transform duration-[2s]" style="max-height: 800px; object-fit: contain;" alt="Imagen de la lección">
                        </div>`;
                    if (b.tipo === 'video') html += `<div class="aspect-video rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl bg-black my-10"><iframe src="https://www.youtube.com/embed/${b.valor}" class="w-full h-full border-none" allowfullscreen></iframe></div>`;
                });

                html += `
                    <div class="pt-20 flex justify-end gap-6">
                        <button onclick="irASiguiente()" class="bg-primary-500 hover:bg-primary-400 text-slate-950 font-black py-4 px-10 rounded-[2rem] transition-all shadow-2xl shadow-primary-500/20 hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 text-lg cursor-pointer">
                            Siguiente <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>`;
                ca.innerHTML = html;

            } else if (act.tipo === 'quiz') {
                const examen = cursoData.modulos[act.modIdx].examen;
                const previo = resultadosExamenesGuardados[examen.id_examen];
                respuestasExamen = previo ? previo.respuestas.map(r => r.respuesta_estudiante) : new Array(examen.preguntas.length).fill(-1);

                let html = `
                    <div class="text-center space-y-4 pb-8 border-b border-primary-500/80">
                        <div class="w-20 h-20 bg-emerald-500/10 rounded-[2rem] flex items-center justify-center text-emerald-400 border border-emerald-500/20 mx-auto mb-6">
                            <i data-lucide="graduation-cap" class="w-10 h-10"></i>
                        </div>
                        <h1 class="text-4xl md:text-6xl font-black text-primary-500 tracking-tighter leading-none">${examen.titulo}</h1>
                        <p class="text-primary-50 font-medium text-lg max-w-2xl mx-auto">Responde las preguntas y aprueba con más del 70%.</p>
                    </div>
                    <div class="space-y-12" id="quizContainer">
                `;

                examen.preguntas.forEach((p, i) => {
                    html += `
                        <div class="quiz-question-card border border-primary-500/20 rounded-[3rem] p-8 md:p-12 space-y-8 shadow-2xl shadow-black/20">
                            <div class="flex items-center gap-4">
                                <span class="w-12 h-12 rounded-2xl bg-primary-500/10 flex items-center justify-center text-primary-400 font-black text-xl border border-primary-500/20">${i + 1}</span>
                                <h3 class="text-2xl md:text-3xl font-bold text-white tracking-tight leading-snug mb-5">${p.enunciado}</h3>
                            </div>
                            <div class="grid gap-4" id="opciones_p${i}">
                                ${p.opciones.map((opt, oIdx) => `
                                    <button onclick="seleccionarOpcionQuiz(${i}, ${oIdx})" id="btn_o_${i}_${oIdx}" class="w-full p-6 rounded-2xl border-2 text-left transition-all flex items-center gap-4 cursor-pointer bg-white/5 border-white/5 text-slate-300 hover:border-white/20 hover:bg-white/10">
                                        <div id="check_o_${i}_${oIdx}" class="w-6 h-6 rounded-full border-2 border-white/10 flex items-center justify-center flex-shrink-0 transition-all"></div>
                                        <span class="text-lg font-bold">${opt}</span>
                                    </button>
                                `).join('')}
                            </div>
                            <div id="feedback_${i}" class="hidden mt-6 p-6 rounded-3xl bg-white/5 border border-primary-400/30">
                                <p class="text-slate-200 font-medium italic">${p.retroalimentacion || 'Respuesta guardada.'}</p>
                            </div>
                        </div>
                    `;
                });

                html += `
                    </div>
                    <div id="btnFinalizarQuiz" class="flex justify-center pt-8">
                        <button onclick="finalizarQuiz()" class="bg-primary-500 hover:bg-primary-400 text-slate-950 font-black py-6 px-16 rounded-[2.5rem] transition-all shadow-2xl shadow-primary-500/20 hover:-translate-y-2 active:scale-95 flex items-center justify-center gap-4 text-2xl border-none cursor-pointer">
                            Finalizar y Calificar
                        </button>
                    </div>
                    <div id="resultadoQuizDiv" class="hidden pb-10"></div>
                `;
                ca.innerHTML = html;

                if (previo) {
                    setTimeout(() => mostrarResultadosExamenUI(examen, previo.porcentaje, true), 50);
                }
            }

            renderSidebar(); // Actualizar activa
            lucide.createIcons();
        }

        function marcarLeccionCompletada() {
            if (actividadActiva?.tipo === 'leccion') {
                const lec = cursoData.modulos[actividadActiva.modIdx].lecciones[actividadActiva.lecIdx];
                leccionesCompletadas.add(lec.id_leccion);
                guardarLeccionesCompletadas();
                actualizarProgresoGeneral();
                cargarActividad(actividadActiva);
            }
        }

        function irASiguiente() {
            if (actividadActiva?.tipo === 'leccion') {
                marcarLeccionCompletada();
                const { modIdx, lecIdx } = actividadActiva;
                const mod = cursoData.modulos[modIdx];

                if (lecIdx + 1 < mod.lecciones.length) {
                    cargarActividad({ tipo: 'leccion', modIdx, lecIdx: lecIdx + 1 });
                } else if (mod.examen && mod.examen.preguntas.length > 0) {
                    cargarActividad({ tipo: 'quiz', modIdx });
                } else if (modIdx + 1 < cursoData.modulos.length) {
                    cursoData.modulos[modIdx + 1].expandido = true;
                    if (cursoData.modulos[modIdx + 1].lecciones.length > 0) {
                        cargarActividad({ tipo: 'leccion', modIdx: modIdx + 1, lecIdx: 0 });
                    }
                }
            } else if (actividadActiva?.tipo === 'quiz') {
                const { modIdx } = actividadActiva;
                if (modIdx + 1 < cursoData.modulos.length) {
                    cursoData.modulos[modIdx + 1].expandido = true;
                    if (cursoData.modulos[modIdx + 1].lecciones.length > 0) {
                        cargarActividad({ tipo: 'leccion', modIdx: modIdx + 1, lecIdx: 0 });
                    }
                } else {
                    window.location.href = 'dashboard-estudiante.html';
                }
            }
        }

        function seleccionarOpcionQuiz(pIdx, oIdx) {
            respuestasExamen[pIdx] = oIdx;
            const examen = cursoData.modulos[actividadActiva.modIdx].examen;

            // Reset de preguntas
            examen.preguntas[pIdx].opciones.forEach((_, i) => {
                const btn = document.getElementById(`btn_o_${pIdx}_${i}`);
                const chk = document.getElementById(`check_o_${pIdx}_${i}`);
                btn.className = "w-full p-6 rounded-2xl border-2 text-left transition-all flex items-center gap-4 cursor-pointer bg-white/5 border-white/5 text-slate-300 hover:border-white/20 hover:bg-white/10";
                chk.className = "w-6 h-6 rounded-full border-2 border-white/10 flex items-center justify-center flex-shrink-0 transition-all";
                chk.innerHTML = "";
            });

            const btn = document.getElementById(`btn_o_${pIdx}_${oIdx}`);
            const chk = document.getElementById(`check_o_${pIdx}_${oIdx}`);
            btn.className = "w-full p-6 rounded-2xl border-2 text-left transition-all flex items-center gap-4 cursor-pointer bg-primary-500/20 border-primary-500 text-white shadow-xl shadow-primary-500/10";
            chk.className = "w-6 h-6 rounded-full border-2 border-primary-500 bg-primary-500 flex items-center justify-center flex-shrink-0 transition-all";
            chk.innerHTML = "<div class='w-2 h-2 bg-white rounded-full'></div>";
        }

        async function finalizarQuiz() {
            if (respuestasExamen.includes(-1)) {
                abrirModal(
                    '¡Un momento!',
                    'Por favor, responde todas las preguntas del examen antes de calificar.',
                    'Entendido',
                    'bg-amber-500 shadow-amber-500/40 cursor-pointer',
                    'alert-triangle',
                    null
                );
                return;
            }

            const examen = cursoData.modulos[actividadActiva.modIdx].examen;
            let correctas = 0;

            examen.preguntas.forEach((p, pIdx) => {
                if (respuestasExamen[pIdx] === p.respuesta_correcta) correctas++;
            });

            const porcentaje = Math.round((correctas / examen.preguntas.length) * 100);
            const uid = obtenerUsuarioId();

            // Guardar resultado
            const payload = {
                usuario_id: uid,
                curso_id: cursoId,
                examen_id: examen.id_examen,
                modulo_id: cursoData.modulos[actividadActiva.modIdx].id_modulo,
                porcentaje,
                correctas,
                incorrectas: examen.preguntas.length - correctas,
                respuestas: respuestasExamen.map((r, i) => ({ pregunta_id: examen.preguntas[i].id_pregunta, respuesta_estudiante: r, es_correcta: r === examen.preguntas[i].respuesta_correcta }))
            };

            try {
                const r = await fetch(API_R, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (r.ok) {
                    const dataGuardada = await r.json();
                    resultadosExamenesGuardados[examen.id_examen] = dataGuardada;
                }
            } catch (e) { console.error('No se pudo guardar en API', e); }

            if (porcentaje >= 70) {
                examenesAprobados.add(examen.id_examen);
                actualizarProgresoGeneral();
            }

            mostrarResultadosExamenUI(examen, porcentaje, false);
        }

        function mostrarResultadosExamenUI(examen, porcentaje, esPrevio) {
            examen.preguntas.forEach((p, pIdx) => {
                const selected = respuestasExamen[pIdx];
                const isCorrect = selected === p.respuesta_correcta;

                // Bloquear UI
                p.opciones.forEach((_, oIdx) => {
                    const btn = document.getElementById(`btn_o_${pIdx}_${oIdx}`);
                    const chk = document.getElementById(`check_o_${pIdx}_${oIdx}`);
                    if (!btn) return;

                    btn.disabled = true;
                    btn.classList.add('opacity-70', 'pointer-events-none');

                    if (oIdx === selected) {
                        if (isCorrect) {
                            btn.className = "w-full p-6 rounded-2xl border-2 text-left flex items-center gap-4 bg-emerald-500/10 border-emerald-500 text-emerald-400 shadow-xl shadow-emerald-500/30";
                            chk.className = "w-6 h-6 rounded-full border-2 border-emerald-500 bg-emerald-500 flex items-center justify-center flex-shrink-0";
                            chk.innerHTML = `<i data-lucide="check" class="text-white w-4 h-4"></i>`;
                        } else {
                            btn.className = "w-full p-6 rounded-2xl border-2 text-left flex items-center gap-4 bg-red-500/10 border-red-500 text-red-400 shadow-xl shadow-red-500/30";
                            chk.className = "w-6 h-6 rounded-full border-2 border-red-500 bg-red-500 flex items-center justify-center flex-shrink-0";
                            chk.innerHTML = `<i data-lucide="x" class="text-white w-4 h-4"></i>`;
                        }
                    } else if (oIdx === p.respuesta_correcta) {
                        // Marcar cual era la correcta
                        btn.className = "w-full p-6 rounded-2xl border-2 text-left flex items-center gap-4 border-emerald-500/50 text-emerald-400/80";
                        chk.className = "w-6 h-6 rounded-full border-2 border-emerald-500/50 bg-transparent flex items-center justify-center flex-shrink-0";
                        chk.innerHTML = `<i data-lucide="check" class="text-emerald-400/80 w-4 h-4"></i>`;
                    }
                });
                const feed = document.getElementById(`feedback_${pIdx}`);
                if (feed) feed.classList.remove('hidden');
            });

            const btnFin = document.getElementById('btnFinalizarQuiz');
            if (btnFin) btnFin.classList.add('hidden');

            const resDiv = document.getElementById('resultadoQuizDiv');
            if (resDiv) {
                resDiv.classList.remove('hidden');
                resDiv.innerHTML = `
                    <div class="bg-gradient-to-br from-emerald-500/20 to-primary-500/20 border-2 border-emerald-500/30 rounded-[3rem] p-10 mt-12 text-center space-y-8 shadow-2xl animate-fadeIn">
                        <h2 class="text-3xl font-black text-white uppercase tracking-tighter">${esPrevio ? 'Tu Resultado Previo' : 'Tu Resultado'}</h2>
                        <div class="text-7xl md:text-8xl font-black text-white leading-none">${porcentaje}%</div>
                        <p class="text-primary-50 font-medium text-lg max-w-md mx-auto">
                            ${porcentaje >= 70 ? '¡Excelente! Has aprobado.' : 'No has alcanzado el 70%. ¡Sigue intentando!'}
                        </p>
                        <div class="flex justify-center gap-4">
                            <button onclick="reintentarQuiz()" class="bg-white text-slate-950 font-black py-4 px-10 rounded-[2rem] hover:bg-slate-200 transition-all shadow-xl">Reintentar</button>
                            ${porcentaje >= 70
                        ? `<button onclick="irASiguiente()" class="bg-emerald-500 text-slate-950 font-black py-4 px-10 rounded-[2rem] hover:bg-emerald-400 transition-all shadow-xl flex items-center gap-2">Siguiente <i data-lucide="arrow-right"></i></button>`
                        : ''
                    }
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
            if (!esPrevio) resDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            renderSidebar();
        }

        async function reintentarQuiz() {
            const examen = cursoData.modulos[actividadActiva.modIdx].examen;
            const uid = obtenerUsuarioId();

            try {
                const params = new URLSearchParams({
                    usuario_id: uid,
                    curso_id: cursoId,
                    examen_id: examen.id_examen
                });

                const r = await fetch(`${API_R}?${params.toString()}`, { method: 'DELETE' });
                if (!r.ok) throw new Error('No se pudo borrar el intento del examen.');
            } catch (e) {
                console.error('Error al borrar el intento del examen:', e);
                abrirModal(
                    'No se pudo reintentar',
                    'No fue posible borrar el intento anterior. Intenta de nuevo en unos segundos.',
                    'Entendido',
                    'bg-red-500 shadow-red-500/40 cursor-pointer',
                    'alert-triangle',
                    null
                );
                return;
            }

            examenesAprobados.delete(examen.id_examen);
            delete resultadosExamenesGuardados[examen.id_examen];
            await actualizarProgresoGeneral(true);
            cargarActividad(actividadActiva);
        }

        async function actualizarProgresoGeneral(permitirReducir = false) {
            if (!cursoData) return;
            let total = 0, completadas = 0;

            cursoData.modulos.forEach(m => {
                m.lecciones.forEach(l => {
                    total++;
                    if (leccionesCompletadas.has(l.id_leccion)) completadas++;
                });
                if (m.examen && m.examen.preguntas.length > 0) {
                    total++;
                    if (examenesAprobados.has(m.examen.id_examen)) completadas++;
                }
            });

            let pct = total === 0 ? 0 : Math.round((completadas / total) * 100);

            if (!permitirReducir && inscripcionActiva && pct < inscripcionActiva.progreso_porcentaje) {
                pct = inscripcionActiva.progreso_porcentaje;
            }

            document.getElementById('progresoTexto').innerText = `${pct}%`;
            document.getElementById('progresoBarra').style.width = `${pct}%`;

            // Sincronizar con MongoDB
            if (inscripcionActiva && (inscripcionActiva.progreso_porcentaje !== pct || (pct === 100 && inscripcionActiva.estado_curso !== 'completado'))) {
                inscripcionActiva.progreso_porcentaje = pct;
                const estado = pct === 100 ? 'completado' : 'en progreso';
                inscripcionActiva.estado_curso = estado;

                try {
                    await fetch(`http://localhost:3000/inscripciones/${inscripcionActiva._id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ progreso_porcentaje: pct, estado_curso: estado })
                    });
                } catch (e) {
                    console.error("Error al sincronizar progreso con DB:", e);
                }
            }
        }

    </script>
</body>

</html>
