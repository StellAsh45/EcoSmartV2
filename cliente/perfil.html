<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Perfil</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/auth-guard.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
                            500: '#10f981', 600: '#059669', 700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeInSlow {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleDownSlow {
            from {
                transform: scale(1.1) translateZ(0);
            }

            to {
                transform: scale(1) translateZ(0);
            }
        }

        .animate-fade-in-slow {
            animation: fadeInSlow 1.5s ease-in-out forwards;
        }

        .animate-scale-down-slow {
            animation: scaleDownSlow 10s linear forwards;
        }

        .bg-acelerado {
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .particles-container {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(190, 242, 100, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 150px 150px;
            opacity: 0.6;
            animation: floatParticles 30s linear infinite;
        }

        @keyframes floatParticles {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>

<body
    class="font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary-500/30 selection:text-white">
    <div class="fixed inset-0 z-[-1] bg-slate-950 overflow-hidden bg-acelerado">
        <div class="absolute inset-0 animate-fade-in-slow">
            <div class="absolute inset-0 animate-scale-down-slow">
                <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                    class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/40 via-transparent to-slate-950/60"></div>
            </div>
            <div class="absolute inset-0 opacity-40 mix-blend-overlay pointer-events-none bg-acelerado">
                <div
                    class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-[150px] animate-pulse bg-primary-500/40">
                </div>
                <div
                    class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] rounded-full blur-[150px] animate-pulse bg-[#4ade80]/40 delay-1000">
                </div>
            </div>
        </div>
        <div class="particles-container"></div>
    </div>

    <!-- Barra de Navegación Superior -->
    <header
        class="fixed top-0 w-full z-50 bg-white/5 backdrop-blur-2xl border-b border-primary-800/90 px-6 sm:px-10 py-4 flex justify-between items-center transition-all">
        <div class="flex items-center gap-4">
            <a href="dashboard-estudiante.html"
                class="p-2 text-slate-400 hover:text-white transition-colors bg-white/5 rounded-xl border-none cursor-pointer">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <div class="flex items-center gap-3 group no-underline text-white">
                <div class="relative">
                    <div
                        class="absolute inset-0 bg-primary-400 blur-xl opacity-20 group-hover:opacity-50 transition-opacity">
                    </div>
                    <img src="assets/logo.png"
                        class="w-12 h-12 relative group-hover:scale-110 transition-all duration-500 ease-out brightness-110 contrast-125 object-contain">
                </div>
                <span class="text-2xl font-black tracking-tight text-white drop-shadow-sm font-heading">
                    Perfil
                </span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="w-px h-6 bg-white/10 hidden md:block"></div>
            <div class="flex items-center gap-4 relative">
                <div class="text-right">
                    <p class="text-sm font-black text-primary-400 uppercase hidden sm:block opacity-0 transition-opacity duration-500"

                </div>
                <button onclick="cerrarSesion()"
                    class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-white/20 hover:scale-105 overflow-hidden border-none cursor-pointer">
                    <i data-lucide="log-out" class="text-red-500 w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main
        class="flex-1 pt-32 pb-20 px-6 max-w-5xl mx-auto w-full space-y-8 relative z-10 animate-[fadeIn_0.8s_ease-out]">

        <!-- Spinner -->
        <div id="spinner-perfil" class="flex flex-col items-center justify-center py-24 gap-6 text-white text-center">
            <div class="relative w-20 h-20">
                <div class="absolute inset-0 bg-primary-500/20 rounded-full animate-ping"></div>
                <div

                    <i data-lucide="loader" class="text-primary-400 w-10 h-10 animate-spin"></i>
                </div>
            </div>
            <p class="text-slate-200 font-black uppercase tracking-[0.2em] text-xs">Cargando...</p>
        </div>

        <div id="contenido-perfil" class="space-y-8 hidden">

            <!-- Nombre y avatar -->
            <div
                class="bg-slate-900/60 backdrop-blur-3xl rounded-[3rem] p-8 md:p-12 border border-white/10 relative overflow-hidden shadow-2xl group border-solid hover:border-primary-500/30 transition-all duration-500">
                <div
                    class="absolute top-0 right-0 w-96 h-96 bg-primary-500/10 blur-[100px] -mr-48 -mt-48 rounded-full pointer-events-none">
                </div>
                <div class="relative z-10 flex flex-col md:flex-row items-center gap-10">
                    <div class="relative group/avatar">

                            class="absolute -inset-4 bg-primary-500/10 rounded-full blur-2xl opacity-40 group-hover/avatar:opacity-100 transition-opacity duration-700 pointer-events-none">
                        </div>
                        <div class="relative">
                            <div

                                <div class="absolute inset-0 bg-gradient-to-tr from-primary-500/10 to-transparent">

                <!-- Datos básicos -->

                    <div class="flex items-center gap-5 mb-10">
                        <div

                            <i data-lucide="user" class="w-7 h-7"></i>
                        </div>

                    </div>
                </section>

                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">

                                </div>
                                <input type="password" id="pass-actual" placeholder="••••••••"

                                </button>

                                <button type="button" onclick="togglePass('pass-confirm', 'eye-confirm')"

    <!-- Overlay de Éxito -->

        <div class="absolute inset-0 bg-slate-950/90 backdrop-blur-2xl"></div>
        <div class="relative flex flex-col items-center text-center space-y-6 max-w-md">
            <div
                class="w-28 h-28 bg-emerald-500 rounded-full flex items-center justify-center shadow-[0_0_60px_rgba(16,249,129,0.3)] animate-scale-in">
                <i data-lucide="check-circle" class="w-16 h-16 text-slate-950"></i>
            </div>
            <div class="space-y-2">

    <!-- Overlay de Error -->
    <div id="overlay-error" class="fixed inset-0 z-[200] flex items-center justify-center p-6 hidden">

        <div class="relative flex flex-col items-center text-center space-y-6 max-w-md">
            <div
                class="w-28 h-28 bg-red-500 rounded-full flex items-center justify-center shadow-[0_0_60px_rgba(239,68,68,0.3)] animate-scale-in">
                <i data-lucide="alert-circle" class="w-16 h-16 text-slate-950"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-3xl font-black text-white tracking-tight font-heading uppercase">Ups, algo salió mal
                </h2>
                <p id="mensaje-error" class="text-red-400 font-bold uppercase tracking-widest text-xs">Error desconocido
                </p>
            </div>
            <button onclick="document.getElementById('overlay-error').classList.add('hidden')"
                class="mt-8 bg-slate-800 text-white font-black py-4 px-10 rounded-2xl transition-all shadow-xl border-none cursor-pointer active:scale-95 border border-white/10">
                Intentar de nuevo
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function cerrarSesion() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('usuario');
            window.location.href = 'ingreso.html';
        }

        function iniciarCarga(callback) {
            const spinner = document.getElementById('spinner-perfil');
            const contenido = document.getElementById('contenido-perfil');

            // Ya vienen con las clases correctas desde el HTML para evitar flicker
            setTimeout(() => {
                spinner.classList.add('hidden');
                contenido.classList.remove('hidden');
                if (callback) callback();
            }, 800);
        }

        document.addEventListener('DOMContentLoaded', () => {
            iniciarCarga(() => {
                const usuario = EcoSmartAuth.requireAuth('estudiante');
                if (!usuario) return;
                if (usuario && Object.keys(usuario).length > 0) {
                        if (usuario.nombre) {
                            document.getElementById('profile-name').textContent = usuario.nombre;
                            document.getElementById('input-nombre').value = usuario.nombre;

                            const navUser = document.getElementById('nav-username');
                            navUser.textContent = usuario.nombre;
                            setTimeout(() => {
                                navUser.classList.remove('opacity-0');
                            }, 100);
                        }
                        if (usuario.correo) {
                            document.getElementById('profile-email').textContent = usuario.correo;
                            document.getElementById('input-correo').value = usuario.correo;
                        }

                        // Lógica para usuarios de Google
                        if (usuario.proveedor === 'google') {
                            const seccionSeguridad = document.getElementById('section-seguridad');
                            const campoPassActual = document.getElementById('container-pass-actual');

                            if (seccionSeguridad) seccionSeguridad.classList.add('hidden');
                            if (campoPassActual) campoPassActual.classList.add('hidden');

                            // Ajustar grid a una sola columna o centrar
                            const mainGrid = document.querySelector('.grid.lg\\:grid-cols-2');
                            if (mainGrid) {
                                mainGrid.classList.remove('lg:grid-cols-2');
                                mainGrid.classList.add('max-w-2xl', 'mx-auto');
                            }
                        }
                } else {
                    window.location.href = 'ingreso.html';
                }
            });
        });

        async function guardarPerfil() {
            const nombre = document.getElementById('input-nombre').value;
            const passActual = document.getElementById('pass-actual').value;
            const passNueva = document.getElementById('pass-nueva').value;
            const passConfirm = document.getElementById('pass-confirm').value;

            if (!nombre || nombre.length < 3) {
                mostrarError('El nombre debe tener al menos 3 caracteres.');
                return;
            }

            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

            if (usuario.proveedor !== 'google' && !passActual) {
                mostrarError('Debes ingresar tu contraseña actual para realizar cambios.');
                return;
            }

            if (passNueva || passConfirm) {
                if (passNueva !== passConfirm) {
                    mostrarError('La nueva contraseña y su confirmación no coinciden.');
                    return;
                }
                const regexPassword = /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{6,}$/;
                if (!regexPassword.test(passNueva)) {
                    mostrarError('La nueva contraseña debe tener mínimo 6 caracteres, una mayúscula, un número y un símbolo.');
                    return;
                }
            }

            const btnGuardar = document.getElementById('btn-guardar');
            btnGuardar.disabled = true;
            btnGuardar.innerHTML = `
                <i data-lucide="loader" class="w-7 h-7 animate-spin"></i>
                <span class="tracking-tight">Actualizando...</span>
            `;
            lucide.createIcons();

            try {
                const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
                const response = await fetch(`http://localhost:3000/usuarios/perfil`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: JSON.stringify({
                        nombre,
                        contrasenaActual: passActual,
                        nuevaContrasena: passNueva || undefined,
                        confirmarNuevaContrasena: passConfirm || undefined
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Error al actualizar el perfil');
                }

                mostrarExito();

                // Actualizar localStorage
                usuario.nombre = nombre;
                localStorage.setItem('usuario', JSON.stringify(usuario));
                document.getElementById('profile-name').textContent = nombre;
                document.getElementById('nav-username').textContent = nombre;

                // Limpiar campos de contraseña
                if (document.getElementById('pass-actual')) document.getElementById('pass-actual').value = '';
                if (document.getElementById('pass-nueva')) document.getElementById('pass-nueva').value = '';
                if (document.getElementById('pass-confirm')) document.getElementById('pass-confirm').value = '';

            } catch (error) {
                mostrarError(error.message);
            } finally {
                btnGuardar.disabled = false;
                btnGuardar.innerHTML = `
                    <i data-lucide="save" class="w-7 h-7"></i>
                    <span class="tracking-tight">Guardar Configuración</span>
                `;
                lucide.createIcons();
            }
        }

        function mostrarExito() {
            const overlay = document.getElementById('overlay-exito');
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 2500);
        }

        function mostrarError(msg) {
            const overlay = document.getElementById('overlay-error');
            const msgElement = document.getElementById('mensaje-error');
            msgElement.textContent = Array.isArray(msg) ? msg[0] : msg;
            overlay.classList.remove('hidden');
        }
    </script>
</body>


</html>
