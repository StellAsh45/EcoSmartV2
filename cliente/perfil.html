<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Perfil</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
                            500: '#10f981', 600: '#059669', 700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeInSlow {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleDownSlow {
            from {
                transform: scale(1.1) translateZ(0);
            }

            to {
                transform: scale(1) translateZ(0);
            }
        }

        .animate-fade-in-slow {
            animation: fadeInSlow 1.5s ease-in-out forwards;
        }

        .animate-scale-down-slow {
            animation: scaleDownSlow 10s linear forwards;
        }

        .bg-acelerado {
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col relative">
    <div class="fixed inset-0 z-[-1] bg-slate-950 overflow-hidden bg-acelerado">
        <div class="absolute inset-0 animate-fade-in-slow">
            <div class="absolute inset-0 animate-scale-down-slow">
                <img src="https://images.unsplash.com/photo-1511497584788-876760111969?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                    class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/80 via-slate-950/60 to-slate-950/90"></div>
            </div>
        </div>
    </div>

    <!-- Barra de Navegación Superior -->
    <header
        class="w-full h-20 bg-slate-900/40 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-4">
            <a href="dashboard-estudiante.html"
                class="p-2.5 bg-white/5 hover:bg-white/10 rounded-xl border border-white/5 transition-colors text-white/70 hover:text-white">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <div class="flex items-center gap-3">
                <img src="assets/logo.png" alt="Logo" class="w-10 h-10 object-contain drop-shadow-md brightness-110">
                <h1 class="text-2xl font-black font-heading tracking-tight text-white">Perfil</h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-bold text-primary-400 tracking-wider uppercase hidden sm:block"
                id="nav-username">[USUARIO]</span>
            <button onclick="cerrarSesion()"
                class="p-2.5 bg-white/5 hover:bg-white/10 hover:bg-red-500/10 rounded-xl border border-white/5 transition-colors text-red-400 group">
                <i data-lucide="log-out" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="flex-1 w-full max-w-5xl mx-auto px-4 py-8 z-10 flex flex-col gap-6">

        <!-- Tarjeta: Tu Perfil -->
        <section
            class="bg-slate-900/60 backdrop-blur-xl rounded-[2rem] p-6 sm:p-10 border border-white/5 shadow-2xl flex flex-col sm:flex-row items-center sm:items-start gap-8 relative overflow-hidden">
            <!-- Brillo de fondo sutil -->
            <div
                class="absolute top-0 right-0 w-64 h-64 bg-primary-500/5 blur-[100px] rounded-full pointer-events-none">
            </div>

            <!-- Avatar -->
            <div
                class="w-32 h-32 sm:w-40 sm:h-40 shrink-0 rounded-[2rem] border border-primary-500/20 bg-slate-950/50 flex items-center justify-center relative overflow-hidden shadow-[0_0_30px_rgba(16,249,129,0.05)]">
                <i data-lucide="user" class="w-16 h-16 sm:w-20 sm:h-20 text-primary-500"></i>
            </div>

            <!-- Info Usuario -->
            <div class="flex flex-col items-center sm:items-start gap-4 text-center sm:text-left flex-1">
                <div
                    class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold text-white/70 uppercase tracking-wider flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-primary-500 shadow-[0_0_8px_rgba(16,249,129,0.8)]"></span>
                    TU PERFIL
                </div>

                <h2 class="text-4xl sm:text-6xl font-black font-heading tracking-tight text-white break-all"
                    id="profile-name">
                    [Nombre de Usuario]
                </h2>

                <div class="flex flex-col sm:flex-row items-center gap-3 sm:gap-4 mt-1">
                    <span class="flex items-center gap-2 text-primary-400 font-medium text-sm sm:text-base">
                        <i data-lucide="mail" class="w-4 h-4"></i> <span id="profile-email">[correo@ejemplo.com]</span>
                    </span>
                    <span class="hidden sm:block w-px h-4 bg-white/20"></span>
                    <span
                        class="px-4 py-1.5 bg-primary-500/10 border border-primary-500/20 text-primary-400 rounded-full text-xs font-bold uppercase tracking-widest">
                        ESTUDIANTE
                    </span>
                </div>
            </div>
        </section>

        <!-- Tarjeta: Mis Certificados -->
        <a href="certificados.html"
            class="bg-gradient-to-r from-[#113A28]/80 to-slate-900/80 backdrop-blur-xl border border-primary-500/20 rounded-[2rem] p-6 flex items-center justify-between shadow-lg cursor-pointer hover:border-primary-500/40 transition-colors group no-underline">
            <div class="flex items-center gap-5 sm:gap-6">
                <div
                    class="w-14 h-14 sm:w-16 sm:h-16 shrink-0 rounded-2xl bg-primary-500 flex items-center justify-center shadow-[0_0_20px_rgba(16,249,129,0.2)] group-hover:scale-105 transition-transform">
                    <i data-lucide="graduation-cap" class="w-7 h-7 sm:w-8 sm:h-8 text-slate-950"></i>
                </div>
                <div>
                    <h3 class="text-xl sm:text-2xl font-black font-heading text-primary-400">Mis Certificados</h3>
                    <p class="text-[10px] sm:text-xs font-bold text-white/70 tracking-widest uppercase mt-1">Visualiza y
                        descarga tus certificados</p>
                </div>
            </div>
            <button
                class="w-10 h-10 sm:w-12 sm:h-12 shrink-0 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-white/10 transition-colors">
                <i data-lucide="arrow-right" class="w-5 h-5 sm:w-6 sm:h-6 text-white/70"></i>
            </button>
        </a>

        <!-- Grid: Datos Básicos y Seguridad -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Datos Básicos -->
            <section class="bg-slate-900/60 backdrop-blur-xl rounded-[2rem] p-6 sm:p-8 border border-white/5 shadow-xl">
                <div class="flex items-center gap-4 mb-8">
                    <div
                        class="w-12 h-12 rounded-xl border border-primary-500/30 bg-primary-500/5 flex items-center justify-center">
                        <i data-lucide="user" class="w-6 h-6 text-primary-400"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-black font-heading text-primary-400">Datos Básicos</h3>
                        <p class="text-[10px] sm:text-xs font-bold text-white/60 tracking-widest uppercase">
                            Configuración de cuenta</p>
                    </div>
                </div>

                <div class="space-y-5">
                    <div class="flex flex-col gap-2">
                        <label class="block text-sm font-bold text-primary-500 pl-1">Nombre Completo</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="user" class="w-5 h-5 text-white/40"></i>
                            </div>
                            <input type="text" id="input-nombre" placeholder="[Nombre Completo]"
                                class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-primary-500/50 transition-all bg-white/5 text-white placeholder:text-white/20 text-sm">
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="block text-sm font-bold text-primary-500 pl-1">Correo Electrónico</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="w-5 h-5 text-white/40"></i>
                            </div>
                            <input type="email" id="input-correo" placeholder="[correo@ejemplo.com]"
                                class="w-full pl-12 pr-4 py-3.5 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-primary-500/50 transition-all bg-white/5 text-white placeholder:text-white/20 text-sm">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Seguridad -->
            <section
                class="bg-slate-900/60 backdrop-blur-xl rounded-[2rem] p-6 sm:p-8 border border-white/5 shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-40 h-40 bg-red-500/5 blur-[80px] rounded-full pointer-events-none">
                </div>

                <div class="flex items-center gap-4 mb-8 relative">
                    <div
                        class="w-12 h-12 rounded-xl border border-red-500/30 bg-red-500/5 flex items-center justify-center">
                        <i data-lucide="lock" class="w-6 h-6 text-red-400"></i>
                    </div>
                    <div>
                        <h3 class="text-xl font-black font-heading text-red-400">Seguridad</h3>
                        <p class="text-[10px] sm:text-xs font-bold text-white/60 tracking-widest uppercase">Resguardar
                            acceso</p>
                    </div>
                </div>

                <div class="space-y-5 relative">
                    <div class="flex flex-col gap-2">
                        <label class="block text-sm font-bold text-red-400 pl-1">Contraseña Actual</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="w-5 h-5 text-primary-400/80"></i>
                            </div>
                            <input type="password" id="pass-actual" placeholder="••••••••"
                                class="w-full pl-12 pr-12 py-3.5 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-red-400/50 transition-all bg-white/5 text-white placeholder:text-white/20 text-sm">
                            <button type="button" onclick="togglePass('pass-actual', 'eye-actual')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <i data-lucide="eye" id="eye-actual" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="block text-sm font-bold text-red-400 pl-1">Nueva Contraseña</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="key" class="w-5 h-5 text-primary-400/80"></i>
                            </div>
                            <input type="password" id="pass-nueva" placeholder="Nueva clave"
                                class="w-full pl-12 pr-12 py-3.5 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-red-400/50 transition-all bg-white/5 text-white placeholder:text-white/20 text-sm">
                            <button type="button" onclick="togglePass('pass-nueva', 'eye-nueva')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <i data-lucide="eye" id="eye-nueva" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="block text-sm font-bold text-red-400 pl-1">Confirmar Nueva</label>
                        <div class="relative group/input">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i data-lucide="check-circle" class="w-5 h-5 text-primary-400/80"></i>
                            </div>
                            <input type="password" id="pass-confirm" placeholder="Confirmar clave"
                                class="w-full pl-12 pr-12 py-3.5 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-red-400/50 transition-all bg-white/5 text-white placeholder:text-white/20 text-sm">
                            <button type="button" onclick="togglePass('pass-confirm', 'eye-confirm')"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/40 hover:text-white transition-colors">
                                <i data-lucide="eye" id="eye-confirm" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Botón Guardar -->
        <div class="mt-4 flex justify-center pb-8">
            <button
                class="bg-primary-500 text-slate-950 px-8 sm:px-12 py-4 rounded-full font-black hover:bg-primary-400 transition-all flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(16,249,129,0.3)] hover:shadow-[0_0_40px_rgba(16,249,129,0.5)] active:scale-95 text-base sm:text-lg w-full sm:w-auto">
                <i data-lucide="save" class="w-6 h-6"></i>
                Guardar Configuración
            </button>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function cerrarSesion() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('usuario');
            window.location.href = 'ingreso.html';
        }

        // Lógica para llenar los datos si existen en localStorage
        document.addEventListener('DOMContentLoaded', () => {
            const usuarioStr = localStorage.getItem('usuario');
            if (usuarioStr) {
                try {
                    const usuario = JSON.parse(usuarioStr);

                    // Actualizar textos si tenemos datos
                    if (usuario.nombre) {
                        document.getElementById('profile-name').textContent = usuario.nombre;
                        document.getElementById('input-nombre').value = usuario.nombre;
                        document.getElementById('nav-username').textContent = usuario.nombre.split(' ')[0];
                    }
                    if (usuario.correo) {
                        document.getElementById('profile-email').textContent = usuario.correo;
                        document.getElementById('input-correo').value = usuario.correo;
                    }
                } catch (e) {
                    console.error("Error leyendo datos del usuario", e);
                }
            }
        });
    </script>
</body>

</html>
