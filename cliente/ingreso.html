<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Ingreso</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80',
                            500: '#10f981', 600: '#059669', 700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) translateZ(0);
            }

            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
            }
        }

        @keyframes slideUpBlur {
            from {
                opacity: 0;
                transform: translateY(20px) translateZ(0);
                backdrop-filter: blur(64px);
                -webkit-backdrop-filter: blur(64px);
            }

            to {
                opacity: 1;
                transform: translateY(0) translateZ(0);
                backdrop-filter: blur(64px);
                -webkit-backdrop-filter: blur(64px);
            }
        }

        @keyframes fadeInSlow {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleDownSlow {
            from {
                transform: scale(1.1) translateZ(0);
            }

            to {
                transform: scale(1) translateZ(0);
            }
        }

        @keyframes fadeInSimple {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out 0.2s both;
        }

        .animate-fade-in-slow {
            animation: fadeInSlow 1.5s ease-in-out forwards;
        }

        .animate-scale-down-slow {
            animation: scaleDownSlow 10s linear forwards;
        }

        .animate-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-slide-up-blur {
            animation: slideUpBlur 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-fade-in-footer {
            animation: fadeInSimple 1s ease-out 1s both;
        }

        .bg-acelerado {
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .particles-container {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(190, 242, 100, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 150px 150px;
            opacity: 0.6;
            animation: floatParticles 30s linear infinite;
        }

        @keyframes floatParticles {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
</head>

<body class="font-sans antialiased">
    <!-- Fondo -->
    <div class="fixed inset-0 z-[-1] bg-slate-950 overflow-hidden bg-acelerado">
        <div class="absolute inset-0 animate-fade-in-slow">
            <div class="absolute inset-0 animate-scale-down-slow">
                <img src="https://images.unsplash.com/photo-1511497584788-876760111969?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                    class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/30 via-slate-950/5 to-slate-950/50"></div>
            </div>
            <div class="absolute inset-0 opacity-40 mix-blend-overlay pointer-events-none bg-acelerado">
                <div
                    class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-[150px] animate-pulse bg-emerald-400/50">
                </div>
                <div
                    class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] rounded-full blur-[150px] animate-pulse bg-lime-300/50 delay-1000">
                </div>
            </div>
        </div>
        <div class="particles-container"></div>
    </div>

    <div class="min-h-screen relative flex items-center justify-center p-6 overflow-hidden bg-acelerado">
        <div class="w-full max-w-xl z-10">
            <div class="mb-6 flex animate-fade-in">
                <a href="inicio.html"
                    class="inline-flex items-center gap-2 px-5 py-2.5 bg-white/5 hover:bg-white/10 text-white rounded-xl border border-white/10 transition-all no-underline font-bold group text-sm backdrop-blur-md">
                    <i data-lucide="arrow-left" class="group-hover:-translate-x-1 transition-transform w-4 h-4"></i>
                    Volver al Inicio
                </a>
            </div>

            <!-- Autenticación -->
            <div
                class="bg-white/10 backdrop-blur-3xl p-10 md:p-14 rounded-[3rem] border border-white/20 shadow-[0_48px_100px_-15px_rgba(0,0,0,0.5)] relative overflow-hidden group animate-slide-up-blur bg-acelerado">
                <div
                    class="absolute bottom-0 left-0 w-64 h-64 bg-emerald-500/10 blur-[80px] -ml-32 -mb-32 rounded-full group-hover:bg-emerald-500/20 transition-colors duration-1000">
                </div>

                <div class="relative">
                    <div class="flex flex-col items-center mb-10 text-center">
                        <div class="relative mb-6">
                            <div
                                class="absolute inset-0 bg-primary-400 blur-2xl opacity-30 group-hover:opacity-60 transition-opacity">
                            </div>
                            <img src="assets/logo.png" alt="Logo"
                                class="w-24 h-24 relative hover:scale-110 transition-transform duration-500 ease-out drop-shadow-2xl brightness-110 contrast-125 object-contain flex-shrink-0">
                        </div>
                        <h2 class="text-3xl font-black text-white mb-2 font-heading tracking-tight">Bienvenido de nuevo
                        </h2>
                        <p class="text-primary-50 font-medium font-sans">Continúa tu viaje hacia el aprendizaje.</p>
                    </div>

                    <form id="formularioIngreso" class="space-y-8">
                        <div class="flex flex-col gap-2.5">
                            <label class="block text-sm font-bold ml-1 text-primary-500">Correo electrónico</label>
                            <div class="relative group/input">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary-400">
                                    <i data-lucide="mail" class="w-5 h-5"></i>
                                </div>
                                <input type="email" id="correo" required placeholder="tu@correo.com"
                                    class="w-full pl-12 pr-6 py-4 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-all bg-white/10 text-white placeholder:text-primary-50/30 text-m">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2.5">
                            <div class="flex justify-between items-center px-1">
                                <label class="block text-sm font-bold text-primary-500">Contraseña</label>
                                <a href="#"
                                    class="text-xs font-bold text-primary-400 hover:text-primary-300 no-underline transition-colors">¿Olvidaste
                                    tu contraseña?</a>
                            </div>
                            <div class="relative group/input">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary-400">
                                    <i data-lucide="lock" class="w-5 h-5"></i>
                                </div>
                                <input type="password" id="contrasena" required placeholder="••••••••"
                                    class="w-full pl-12 pr-14 py-4 rounded-2xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-primary-500 transition-all bg-white/10 text-white placeholder:text-primary-50/30 text-xs">
                                <button type="button" onclick="alternarVisibilidadContrasena()"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-primary-50">
                                    <i data-lucide="eye" id="iconoOjo" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="botonIngreso"
                            class="w-full bg-primary-500 text-slate-950 py-4 rounded-2xl font-black hover:bg-primary-400 transition-all flex items-center justify-center gap-2 group/btn shadow-xl shadow-primary-500/20 active:scale-95 text-lg">
                            <span id="textoBoton">Entrar</span>
                            <i data-lucide="arrow-right"
                                class="w-6 h-6 group-hover/btn:translate-x-1 transition-transform"></i>
                        </button>
                    </form>

                    <div class="mt-10 pt-8 border-t border-white/10">
                        <p class="text-primary-50 font-medium text-sm">
                            ¿No tienes cuenta? <a href="registro.html"
                                class="font-black text-primary-400 hover:text-primary-300 no-underline ml-1">Regístrate</a>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="mt-8 text-center pb-8 pt-8 animate-fade-in-footer">
                <p class="text-primary-50 text-sm font-medium">© 2026 EcoSmart. Comprometidos con el planeta.</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function alternarVisibilidadContrasena() {
            const input = document.getElementById('contrasena');
            const icon = document.getElementById('iconoOjo');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // --- Logica de login con JWT ---
        const API_URL = 'http://localhost:3000/auth/login';

        document.getElementById('formularioIngreso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('botonIngreso');
            const btnText = btn.querySelector('span');
            const correo = document.getElementById('correo').value;
            const contrasena = document.getElementById('contrasena').value;

            // Bloquear botón mientras carga
            btn.disabled = true;
            const originalText = btnText.textContent;
            btnText.textContent = 'Verificando...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, contrasena })
                });

                const data = await res.json();

                if (res.ok) {
                    // Guardar Token y datos del usuario
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));

                    // Redirección por roles
                    if (data.usuario.rol === 'administrador') {
                        window.location.href = 'index.html';
                    } else {
                        window.location.href = 'dashboard-estudiante.html';
                    }
                } else {
                    // Manejar errores (como cuenta no activa)
                    alert(data.message || 'Error al iniciar sesión');
                }
            } catch (err) {
                alert('No se pudo conectar con el servidor. ¿Está encendido?');
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });
    </script>
</body>

</html>
