<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart - Mis Certificados</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2pdf.js para generación de certificados -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Generador de certificados EcoSmart -->
    <script src="js/generador-certificados.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ffffff', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac',
                            400: '#4ade80', 500: '#10f981', 600: '#059669',
                            700: '#047857', 800: '#135300', 900: '#7CBC02',
                        }
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: white;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeInSlow {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleDownSlow {
            from {
                transform: scale(1.1);
            }

            to {
                transform: scale(1);
            }
        }

        .animate-fade-in-slow {
            animation: fadeInSlow 0.8s ease-in-out forwards;
        }

        .animate-scale-down-slow {
            animation: scaleDownSlow 10s linear forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Estilos Premium de la Tarjeta (Paridad Absoluta) */
        @keyframes rotar-borde {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .tarjeta-borde-animado {
            position: relative;
            z-index: 0;
        }

        .animacion-borde {
            position: absolute;
            inset: 0;
            padding: 1.5px;
            /* Haz de luz fino */
            border-radius: inherit;
            pointer-events: none;
            z-index: 20;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .animacion-borde::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 150%;
            height: 150%;
            background: conic-gradient(from 0deg,
                    transparent 0%,
                    transparent 75%,
                    #10f981 85%,
                    #bef264 95%,
                    #10f981 100%);
            animation: rotar-borde 4s linear infinite;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(16, 249, 129, 0.2);
            border-radius: 10px;
        }

        .particles-container {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(34, 197, 94, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 70% 60%, rgba(190, 242, 100, 0.4) 1px, transparent 1px),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 150px 150px;
            opacity: 0.4;
            animation: floatParticles 30s linear infinite;
        }

        @keyframes floatParticles {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }
    </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden custom-scrollbar">
    <!-- Fondo Visual-->
    <div class="fixed inset-0 z-[-1] bg-slate-950 overflow-hidden">
        <div class="absolute inset-0 animate-fade-in-slow">
            <div class="absolute inset-0 animate-scale-down-slow">
                <img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80"
                    class="w-full h-full object-cover grayscale-[0.2] contrast-[1.1]">
                <div class="absolute inset-0 bg-gradient-to-b from-slate-950/50 via-slate-950/30 to-slate-950/60"></div>
            </div>

            <div class="absolute inset-0 opacity-40 mix-blend-overlay pointer-events-none">
                <div
                    class="absolute top-[-20%] left-[-10%] w-[70%] h-[70%] rounded-full blur-[150px] animate-pulse bg-emerald-600/30">
                </div>
                <div
                    class="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] rounded-full blur-[150px] animate-pulse bg-slate-700/40 delay-1000">
                </div>
            </div>
        </div>
        <div class="particles-container pointer-events-none"></div>
    </div>

    <!-- Header -->
    <header
        class="fixed top-0 w-full z-50 bg-white/5 backdrop-blur-2xl border-b border-primary-800/90 px-6 sm:px-10 py-4 flex justify-between items-center transition-all">
        <div class="flex items-center gap-4">
            <a href="perfil.html"
                class="p-2 text-slate-400 hover:text-white transition-colors bg-white/5 rounded-xl border-none cursor-pointer">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <div class="flex items-center gap-3 group no-underline text-white">
                <div class="relative">
                    <div
                        class="absolute inset-0 bg-primary-400 blur-xl opacity-20 group-hover:opacity-50 transition-opacity">
                    </div>
                    <img src="assets/logo.png"
                        class="w-12 h-12 relative group-hover:scale-110 transition-all duration-500 ease-out brightness-110 contrast-125 object-contain">
                </div>
                <span class="text-2xl font-black tracking-tight text-white drop-shadow-sm font-heading">
                    Certificados
                </span>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="w-px h-6 bg-white/10 hidden md:block"></div>
            <div class="flex items-center gap-4 relative">
                <button onclick="cerrarSesion()"
                    class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center hover:bg-white/20 hover:scale-105 overflow-hidden border-none cursor-pointer">
                    <i data-lucide="log-out" class="text-red-500 w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="relative z-10 flex-1 p-6 pt-32 pb-20 overflow-y-auto custom-scrollbar" style="isolation: isolate;">
        <div class="max-w-7xl mx-auto mt-8 sm:mt-10">

            <!-- Vista de Carga -->
            <div id="loader" class="hidden flex justify-center py-20">
                <div class="w-12 h-12 border-4 border-primary-500/20 border-t-primary-500 rounded-full animate-spin">
                </div>
            </div>

            <!-- Vista Vacía -->
            <div id="vista-vacia"
                class="hidden text-center py-24 bg-black/20 backdrop-blur-3xl rounded-[3rem] border border-white/5 shadow-2xl animate-fadeIn">
                <div
                    class="w-24 h-24 bg-emerald-500/10 rounded-3xl border border-emerald-500/20 flex items-center justify-center mx-auto mb-8 shadow-[0_0_50px_rgba(16,249,129,0.1)]">
                    <i data-lucide="graduation-cap" class="w-12 h-12 text-primary-500"></i>
                </div>
                <h2 class="text-3xl font-black text-white mb-3 font-heading">Sin certificados aún</h2>
                <p class="text-slate-400 font-medium text-lg max-w-md mx-auto">
                    Completa un curso para obtener tu primer certificado y descargarlo aquí mismo.
                </p>
                <button onclick="window.location.href='catalogo.html'"
                    class="mt-10 bg-primary-500 hover:bg-primary-400 text-slate-950 font-black py-4 px-10 rounded-2xl transition-all shadow-xl shadow-primary-500/20 active:scale-95 text-lg">
                    Explorar Cursos
                </button>
            </div>

            <!-- Grid de Certificados -->
            <div id="grid-certificados" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8 xl:gap-10">
                <!-- Las tarjetas se insertarán aquí dinámicamente -->
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        const API_URL = 'http://localhost:3000';

        function obtenerID(valor) {
            if (!valor) return null;
            if (typeof valor === 'object' && valor.$oid) return valor.$oid;
            return valor;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
            const grid = document.getElementById('grid-certificados');
            const vacia = document.getElementById('vista-vacia');
            const loader = document.getElementById('loader');

            if (!usuario.nombre) {
                window.location.href = 'ingreso.html';
                return;
            }

            loader.classList.remove('hidden');
            grid.classList.add('hidden');

            try {
                const userID = obtenerID(usuario._id) || obtenerID(usuario.id) || obtenerID(usuario.sub);
                const r = await fetch(`${API_URL}/certificados?usuario_id=${userID}`);
                const certificados = r.ok ? await r.json() : [];

                loader.classList.add('hidden');

                if (certificados.length === 0) {
                    vacia.classList.remove('hidden');
                } else {
                    grid.classList.remove('hidden');
                    grid.innerHTML = '';

                    certificados.forEach(cert => {
                        const card = crearTarjetaCertificado(cert, usuario.nombre);
                        grid.appendChild(card);
                    });
                }
                lucide.createIcons();
            } catch (error) {
                console.error('Error cargando certificados:', error);
                loader.classList.add('hidden');
                vacia.classList.remove('hidden');
            }
        });

        function crearTarjetaCertificado(cert, nombreUsuario) {
            const certId = obtenerID(cert._id);
            const div = document.createElement('div');
            div.className = 'bg-white/5 backdrop-blur-3xl rounded-[2.5rem] p-8 border border-white/5 hover:border-emerald-500/30 hover:bg-slate-900/60 transition-all duration-500 group flex flex-col h-full tarjeta-borde-animado animate-fadeIn';
            // Guardar datos del cert para usarlos al generar el PDF
            div.dataset.cert = JSON.stringify(cert);

            div.innerHTML = `
                <div class="animacion-borde"></div>
                <div class="absolute inset-0 bg-emerald-500/0 group-hover:bg-emerald-500/5 transition-colors duration-500"></div>

                <div class="relative z-10 flex-1 flex flex-col">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-400 mb-6 border border-emerald-500/20 group-hover:scale-110 group-hover:bg-emerald-500/20 transition-all duration-500 shadow-[0_0_30px_rgba(16,185,129,0.1)]">
                        <i data-lucide="award" class="w-8 h-8"></i>
                    </div>

                    <h4 class="text-2xl font-black text-white mb-3 leading-tight font-heading group-hover:text-primary-400 transition-colors">
                        ${cert.curso_titulo}
                    </h4>
                    
                    <p class="text-sm font-medium text-slate-400 mb-8 flex-1">
                        Expedido a nombre de: <br>
                        <strong class="text-slate-200 text-lg">${nombreUsuario}</strong>
                    </p>

                    <div class="flex items-center justify-between border-t border-white/5 pt-6 mb-4">
                        <span class="text-[10px] font-black text-primary-400 uppercase tracking-widest">Fecha</span>
                        <span class="text-xs font-bold text-white">${formatearFecha(cert.fecha_emision)}</span>
                    </div>

                    <p class="text-[10px] font-bold text-slate-500 mb-6 tracking-wider">ID: ${cert.codigo}</p>

                    <button onclick="descargarCertificado(this, '${certId}')"
                        class="w-full bg-emerald-500/10 hover:bg-emerald-500 text-emerald-400 hover:text-slate-950 font-black py-4 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 border border-emerald-500/30 hover:border-emerald-500 hover:-translate-y-1 shadow-lg shadow-emerald-500/20 cursor-pointer">
                        <i data-lucide="download" class="w-5 h-5"></i>
                        Descargar PDF
                    </button>
                </div>
            `;
            return div;
        }

        function formatearFecha(fechaStr) {
            const date = new Date(fechaStr);
            return date.toLocaleDateString('es-ES', {
                day: '2-digit',
                month: 'long',
                year: 'numeric'
            });
        }

        async function descargarCertificado(btn, certId) {
            if (!certId) return;
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Generando...';
            lucide.createIcons();
            try {
                // Recuperar los datos del cert desde el data attribute del div padre
                const tarjeta = btn.closest('[data-cert]');
                let certData = tarjeta ? JSON.parse(tarjeta.dataset.cert) : null;

                if (!certData) {
                    const r = await fetch(`http://localhost:3000/certificados/${certId}`);
                    if (r.ok) certData = await r.json();
                }

                if (!certData) throw new Error('No data');

                // Si el usuario cambió su nombre en su perfil, lo actualizamos al vuelo
                const usuarioActual = JSON.parse(localStorage.getItem('usuario') || '{}');
                if (usuarioActual.nombre) {
                    certData.usuario_nombre = usuarioActual.nombre;
                }

                await generarYDescargarCertificado(certData);

            } catch (error) {
                console.error('Error generando certificado:', error);
                alert('Error al generar el certificado. Por favor intenta de nuevo.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'ingreso.html';
        }
    </script>
</body>

</html>
